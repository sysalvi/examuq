name: Build ExamUQ Client Tauri (Beta)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: client-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Tauri app (beta channel)
        env:
          CI: 'true'
          EXAMUQ_UPDATE_CHANNEL: beta
          EXAMUQ_ALLOW_BETA: 'true'
          EXAMUQ_UPDATER_ENDPOINT_TEMPLATE: https://updates.examuq.id/{{target}}/{{arch}}/{{current_version}}?channel={channel}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Upload macOS artifact (beta)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: examuq-client-tauri-macos-beta
          path: |
            client-tauri/src-tauri/target/release/bundle/macos/*.app
            client-tauri/src-tauri/target/release/bundle/macos/*.app.tar.gz
            client-tauri/src-tauri/target/release/bundle/macos/*.sig
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows artifact (beta)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: examuq-client-tauri-windows-beta
          path: |
            client-tauri/src-tauri/target/release/bundle/nsis/*.exe
            client-tauri/src-tauri/target/release/bundle/msi/*.msi
            client-tauri/src-tauri/target/release/bundle/nsis/*.sig
            client-tauri/src-tauri/target/release/bundle/msi/*.sig
          if-no-files-found: error
          retention-days: 7
