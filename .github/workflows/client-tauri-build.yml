name: Build ExamUQ Client Tauri

on:
  workflow_dispatch:
  push:
    paths:
      - 'client-tauri/**'
      - '.github/workflows/client-tauri-build.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: client-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        env:
          CI: 'true'
          EXAMUQ_UPDATE_CHANNEL: stable
          EXAMUQ_ALLOW_BETA: 'false'
          EXAMUQ_UPDATER_ENDPOINT_TEMPLATE: https://updates.examuq.id/{{target}}/{{arch}}/{{current_version}}?channel={channel}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles dmg

      - name: Prepare macOS helper package
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p src-tauri/target/release/bundle/macos-support
          cp src-tauri/bundle/macos/README_MACOS.txt src-tauri/target/release/bundle/macos-support/
          cp src-tauri/bundle/macos/FIX_MACOS.command src-tauri/target/release/bundle/macos-support/
          chmod +x src-tauri/target/release/bundle/macos-support/FIX_MACOS.command

          version=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json', 'r', encoding='utf-8'))['version'])")

          mkdir -p src-tauri/target/release/bundle/macos-distribution
          cp src-tauri/target/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/macos-distribution/
          cp src-tauri/target/release/bundle/macos-support/* src-tauri/target/release/bundle/macos-distribution/
          cd src-tauri/target/release/bundle/macos-distribution
          zip -r "ExamUQ Client_${version}_macos_with_help.zip" .

      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        env:
          CI: 'true'
          EXAMUQ_UPDATE_CHANNEL: stable
          EXAMUQ_ALLOW_BETA: 'false'
          EXAMUQ_UPDATER_ENDPOINT_TEMPLATE: https://updates.examuq.id/{{target}}/{{arch}}/{{current_version}}?channel={channel}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Prepare Windows portable app
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $portableDir = Join-Path $releaseDir "portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          $version = (Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json).version

          $preferredNames = @("client-tauri.exe", "ExamUQ Client.exe", "ExamUQ Client Tauri.exe")

          $candidate = $null
          foreach ($name in $preferredNames) {
            $path = Join-Path $releaseDir $name
            if (Test-Path $path) {
              $candidate = Get-Item $path
              break
            }
          }

          if (-not $candidate) {
            $candidate = Get-ChildItem $releaseDir -Filter "*.exe" -File |
              Where-Object { $_.Name -notmatch "setup|unins|crashpad|squirrel|updater" } |
              Sort-Object Length -Descending |
              Select-Object -First 1
          }

          if (-not $candidate) {
            throw "Portable executable not found in $releaseDir"
          }

          Copy-Item $candidate.FullName (Join-Path $portableDir "ExamUQ Client_${version}_x64_portable.exe") -Force

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: examuq-client-tauri-macos
          path: |
            client-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            client-tauri/src-tauri/target/release/bundle/macos-support/*
            client-tauri/src-tauri/target/release/bundle/macos-distribution/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: examuq-client-tauri-windows
          path: |
            client-tauri/src-tauri/target/release/bundle/nsis/*.exe
            client-tauri/src-tauri/target/release/bundle/msi/*.msi
            client-tauri/src-tauri/target/release/portable/*.exe
          if-no-files-found: error
          retention-days: 7
