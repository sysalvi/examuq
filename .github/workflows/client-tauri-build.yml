name: Build ExamUQ Client Tauri

on:
  workflow_dispatch:
  push:
    paths:
      - 'client-tauri/**'
      - '.github/workflows/client-tauri-build.yml'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: client-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-tauri/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        env:
          CI: 'true'
          EXAMUQ_UPDATE_CHANNEL: stable
          EXAMUQ_ALLOW_BETA: 'false'
          EXAMUQ_UPDATER_ENDPOINT_TEMPLATE: https://updates.examuq.id/{{target}}/{{arch}}/{{current_version}}?channel={channel}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles dmg

      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        env:
          CI: 'true'
          EXAMUQ_UPDATE_CHANNEL: stable
          EXAMUQ_ALLOW_BETA: 'false'
          EXAMUQ_UPDATER_ENDPOINT_TEMPLATE: https://updates.examuq.id/{{target}}/{{arch}}/{{current_version}}?channel={channel}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: examuq-client-tauri-macos
          path: |
            client-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: examuq-client-tauri-windows
          path: |
            client-tauri/src-tauri/target/release/bundle/nsis/*.exe
            client-tauri/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 7
