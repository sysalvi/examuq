<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamUQ Client</title>
    <script type="module" src="./main.js" defer></script>
  </head>

  <body>
    <main id="launcherShell" class="shell" role="main" aria-labelledby="title">
      <section class="card">
        <div class="brand-stack">
          <img src="./assets/logosekolah_examuq.svg" alt="Logo Sekolah" class="brand-logo school" />
        </div>

        <h1 id="title">ExamUQ Client</h1>
        <p class="subtitle">Siap memulai ujian. Klik <strong>Mulai Ujian</strong> untuk masuk mode ujian.</p>

        <div class="device-box">
          <span>Device ID</span>
          <code id="deviceId">...</code>
        </div>

        <div class="actions">
          <button id="startExamButton" type="button" class="btn primary">Mulai Ujian</button>
          <button id="openSettingsButton" type="button" class="btn ghost">Pengaturan</button>
        </div>

        <p id="appVersion" class="app-version">Versi aplikasi: ...</p>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>
    </main>

    <section id="examShell" class="exam-shell" aria-hidden="true">
      <div id="examLoading" class="exam-loading" aria-live="polite">Memuat portal ujian...</div>
      <button id="openFinishOverlayButton" type="button" class="exam-finish-trigger">Selesai Ujian</button>
      <iframe id="examFrame" class="exam-frame" title="Portal Ujian"></iframe>

      <div id="finishOverlay" class="finish-overlay" aria-hidden="true">
        <div class="finish-card" role="dialog" aria-modal="true" aria-labelledby="finishTitle">
          <h3 id="finishTitle">Akhiri Sesi Ujian?</h3>
          <p>Pastikan kamu sudah benar-benar selesai. Setelah diakhiri, kamu akan kembali ke halaman awal.</p>
          <div class="finish-actions">
            <button id="cancelFinishButton" type="button" class="btn ghost">Batal</button>
            <button id="confirmFinishButton" type="button" class="btn primary">Ya, Akhiri Sesi</button>
          </div>
        </div>
      </div>
    </section>

    <section id="settingsOverlay" class="overlay" aria-hidden="true">
      <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="overlay-head">
          <h2 id="settingsTitle">Pengaturan Server</h2>
          <button id="closeSettingsButton" type="button" class="icon-btn" aria-label="Tutup Pengaturan">✕</button>
        </div>

        <form id="settingsForm" class="form" novalidate>
          <label class="label" for="serverBaseUrl">Server Base URL</label>
          <input
            id="serverBaseUrl"
            name="serverBaseUrl"
            type="text"
            required
            placeholder="http://10.10.20.2:6996"
            autocomplete="off"
          />

          <button id="saveSettingsButton" type="submit" class="btn primary">Simpan Pengaturan</button>
          <button id="openAdminButton" type="button" class="btn ghost">Buka Admin</button>
        </form>
      </div>
    </section>
  </body>
</html>
